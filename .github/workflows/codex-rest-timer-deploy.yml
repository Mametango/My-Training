name: Codex Rest Timer Deploy

on:
  push:
    paths:
      - '.github/workflows/codex-rest-timer-deploy.yml'

permissions:
  contents: write

jobs:
  patch_build_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch 2-minute rest timer
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('client/src/components/WorkoutList.tsx')
          text = path.read_text(encoding='utf-8')

          def replace_once(needle, replacement, label):
              global text
              if needle not in text:
                  raise RuntimeError(f'Patch anchor not found: {label}')
              text = text.replace(needle, replacement, 1)

          if 'Pause, Play, RotateCcw, Timer' not in text:
              replace_once(
                  "import { Trash2, GripVertical, User, Settings } from 'lucide-react';",
                  "import { Pause, Play, RotateCcw, Timer, Trash2, GripVertical, User, Settings } from 'lucide-react';",
                  'lucide import'
              )

          if 'const REST_DURATION_SECONDS = 120;' not in text:
              helpers = '''const REST_DURATION_SECONDS = 120;

const formatRestTime = (seconds: number): string => {
  const minutes = Math.floor(seconds / 60);
  const remainingSeconds = seconds % 60;
  return `${minutes}:${String(remainingSeconds).padStart(2, '0')}`;
};

'''
              replace_once('interface WorkoutListProps {', helpers + 'interface WorkoutListProps {', 'helpers')

          if 'const [restRemaining, setRestRemaining]' not in text:
              replace_once(
                  '  const [loadingPreviousExercise, setLoadingPreviousExercise] = useState(false);',
                  '  const [loadingPreviousExercise, setLoadingPreviousExercise] = useState(false);\n  const [restRemaining, setRestRemaining] = useState(REST_DURATION_SECONDS);\n  const [restRunning, setRestRunning] = useState(false);',
                  'rest state'
              )

          if 'const startRestTimer = () => {' not in text:
              handlers = '''  useEffect(() => {
    if (!restRunning) return;

    if (restRemaining <= 0) {
      setRestRunning(false);
      return;
    }

    const timeoutId = window.setTimeout(() => {
      setRestRemaining(prev => Math.max(prev - 1, 0));
    }, 1000);

    return () => window.clearTimeout(timeoutId);
  }, [restRunning, restRemaining]);

  const startRestTimer = () => {
    setRestRemaining(REST_DURATION_SECONDS);
    setRestRunning(true);
  };

  const toggleRestTimer = () => {
    if (restRemaining <= 0) {
      startRestTimer();
      return;
    }

    setRestRunning(prev => !prev);
  };

  const resetRestTimer = () => {
    setRestRunning(false);
    setRestRemaining(REST_DURATION_SECONDS);
  };

'''
              if '  // muscleOverrideを追加' in text:
                  replace_once('  // muscleOverrideを追加', handlers + '  // muscleOverrideを追加', 'timer handlers')
              else:
                  replace_once('  const handleAddNew = () => {', handlers + '  const handleAddNew = () => {', 'timer handlers')

          text = text.replace(
              '      await onSubmitWorkout(workoutData);\n      setAddingNew(false);',
              '      await onSubmitWorkout(workoutData);\n      startRestTimer();\n      setAddingNew(false);'
          )
          text = text.replace(
              '      await onSubmitWorkout(workoutData);\n      setAddingSet(null);',
              '      await onSubmitWorkout(workoutData);\n      startRestTimer();\n      setAddingSet(null);'
          )

          if '2分レスト' not in text:
              rest_panel = '''      <div className={`mb-6 rounded-lg border p-4 ${
        restRemaining === 0
          ? 'border-green-300 bg-green-50'
          : restRunning
            ? 'border-orange-300 bg-orange-50'
            : 'border-gray-200 bg-gray-50'
      }`}>
        <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div className="flex items-center gap-3">
            <div className={`flex h-11 w-11 items-center justify-center rounded-full ${
              restRemaining === 0 ? 'bg-green-600 text-white' : 'bg-orange-500 text-white'
            }`}>
              <Timer size={22} />
            </div>
            <div>
              <div className="text-sm font-semibold text-gray-700">2分レスト</div>
              <div className={`font-mono text-3xl font-bold ${
                restRemaining === 0 ? 'text-green-700' : 'text-gray-900'
              }`}>
                {formatRestTime(restRemaining)}
              </div>
            </div>
          </div>

          <div className="flex gap-2">
            <button
              type="button"
              onClick={toggleRestTimer}
              className={`flex flex-1 items-center justify-center gap-2 rounded-md px-4 py-2 text-sm font-medium text-white transition-colors sm:flex-none ${
                restRunning ? 'bg-orange-600 hover:bg-orange-700' : 'bg-green-600 hover:bg-green-700'
              }`}
            >
              {restRunning ? <Pause size={16} /> : <Play size={16} />}
              {restRunning ? '一時停止' : restRemaining === 0 ? 'もう一度' : restRemaining === REST_DURATION_SECONDS ? '開始' : '再開'}
            </button>
            <button
              type="button"
              onClick={resetRestTimer}
              className="flex flex-1 items-center justify-center gap-2 rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 sm:flex-none"
            >
              <RotateCcw size={16} />
              リセット
            </button>
          </div>
        </div>
        {restRemaining === 0 && (
          <div className="mt-3 rounded-md bg-green-100 px-3 py-2 text-sm font-semibold text-green-800">
            レスト完了です。次のセットに進めます。
          </div>
        )}
      </div>
      
'''
              replace_once(
                  '      <div className="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-200">',
                  rest_panel + '      <div className="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-200">',
                  'timer panel'
              )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/codex-rest-timer-deploy.yml

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/components/WorkoutList.tsx .github/workflows/codex-rest-timer-deploy.yml
          git commit -m "Add 2-minute rest timer"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build app
        run: |
          cd client
          npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: my-training-8d8a9
          channelId: live
